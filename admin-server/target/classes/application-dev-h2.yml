# dev-h2：使用 H2 内存库，不需要外部 MySQL
spring:
  datasource:
    url: jdbc:h2:mem:pet_treats;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
      continue-on-error: true

# H2 下关闭 p6spy，避免驱动不兼容
decorator:
  datasource:
    p6spy:
      enable-logging: false
