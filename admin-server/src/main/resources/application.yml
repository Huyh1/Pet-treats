server:
  port: 8544
  servlet:
    context-path: /api

spring:
  profiles:
    active: dev
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto
    banner: false
  mapper-locations: classpath*:mapper/**/*.xml

# JWT 配置
jwt:
  secret: furou-admin-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
  expire: 86400  # 24h，单位秒

# p6spy 配置（dev 下打印可读 SQL）
decorator:
  datasource:
    p6spy:
      enable-logging: true
      logging: slf4j
      log-format: "%(currentTime) | took %(executionTime)ms | %(category) | %(sql)"

# Springdoc / Swagger
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

logging:
  level:
    root: INFO
    com.furou: DEBUG
    org.springframework.security: INFO
